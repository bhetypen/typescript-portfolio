name: Build → Deploy branch

on:
  push:
    branches: master
  workflow_dispatch:

permissions:
  contents: write   # allows pushing to deploy branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare publish folder
        run: |
          rm -rf publish
          mkdir publish
          if [ -d "dist" ]; then
            cp -r dist/* publish/
          elif [ -d "build" ]; then
            cp -r build/* publish/
          else
            echo "No dist/ or build/ folder found!"
            exit 1
          fi
          # include SPA .htaccess if you keep it in repo root
          [ -f ".htaccess" ] && cp .htaccess publish/.htaccess || true

      - name: Push to deploy branch
        run: |
          cd publish
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy $GITHUB_SHA"
          git branch -M deploy
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -f origin deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
