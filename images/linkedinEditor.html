<body class="bg-slate-100">
<div id="root"></div>

<script type="text/babel">
    const { useState, useMemo, useRef, useEffect } = React;

    const MAX_CHARS = 3000;
    const HOOK_MAX = 150;

    const STORAGE_KEY = "linkedin_post_editor_post_v1";
    const STORAGE_AUTOSAVE_KEY = "linkedin_post_editor_autosave_v1";

    const EMOJIS = [
        "💼",
        "🚀",
        "🔥",
        "✅",
        "🙌",
        "👇",
        "📌",
        "💡",
        "🎯",
        "🤝",
    ];

    const TEMPLATES = [
        {
            id: "job_announcement",
            name: "Job announcement",
            description: "Share a new role or career move.",
            content: `🚀 Excited to share a new chapter!

I’m incredibly grateful for:

👇 Curious about what we’re building at [COMPANY]?
Drop a comment or send me a message – always happy to chat.`
        },
        {
            id: "story_post",

            description: "Share a personal lesson or transformation.",
            content: `💡 One year ago, I was here: [describe your “before” situation].

Today, things look very different.

If you’re currently in the “before” stage:

        },
        {
            id: "launch_post",
            name: "Launch post (product / SaaS)",
            description: "Announce a product or feature launch.",
            content: `🚀 Launching [PRODUCT / PROJECT NAME]

For the past [X weeks/months], I’ve been working on something I wish I had when [describe your problem or use case].

Today, it’s live. 🎉

Here’s what it does:

• [Benefit #2 – what it saves (time, money, mistakes)]
• [Benefit #3 – who it’s for]

Built for:
• [Ideal user #1]

• [Ideal user #3]

Why I built this:
• [Personal reason / frustration you solved]

If you:
• Struggle with [problem]
• Want [specific outcome]
• Care about [niche / topic]

…then this might be for you.

👇 Comment “DEMO” or send me a message, and I’ll share more details, screenshots, or a walkthrough.`
        },
        {
            id: "personal_brand",
            name: "Personal brand / intro",
            description: "Introduce who you are and what you talk about.",
            content: `👋 Quick intro for anyone new here.

I’m [YOUR NAME], and I help [WHO YOU HELP] achieve [RESULT] through [HOW YOU DO IT].

On this profile, you’ll mostly see posts about:
• [Topic #1 – e.g. job search, SaaS growth, leadership]
• [Topic #2]
• [Topic #3]

Over the last [X years], I’ve:
• [Key achievement #1]
• [Key achievement #2]
• [Key achievement #3]

Why I’m active on LinkedIn:
• To share what I’m learning in public
• To connect with people who care about [topic]

If any of this aligns with what you do or want:
👇 Let’s connect. Tell me what you’re working on right now.`
        },
        {
            id: "job_search",
            name: "Job search post",
            description: "Let people know you’re looking – without sounding desperate.",
            content: `💼 I’m currently exploring new opportunities.

After [X years] in [your field/industry], I’m looking for a role where I can:
• [Impact you want to create]
• [Type of team or environment]
• [Type of problems you want to solve]

My background:
• [Your role/title] with experience in [skills/tools]
• Worked at [Company #1], [Company #2]
• [Key achievement or result #1]
• [Key achievement or result #2]

I’m especially interested in:
• Roles: [Job titles you’re targeting]
• Industries: [Industry #1], [Industry #2]
• Locations: [Location / Remote]

If you know of a team that’s hiring for someone who:
• [Strength #1]
• [Strength #2]
• [Strength #3]

…I’d be grateful for intros, leads, or a quick conversation.

👇 Happy to send my CV / portfolio or share more about my work in the comments or via DM.`
        }
    ];

    // Unicode styling (bold + script-y italic for now)
    const styleText = (text, style) => {
        let result = "";
        for (const ch of text) {
            const code = ch.codePointAt(0);
            let styledChar = ch;

            if (style === "bold") {
                if (ch >= "A" && ch <= "Z") {
                    styledChar = String.fromCodePoint(
                        0x1d400 + (code - "A".codePointAt(0))
                    );
                } else if (ch >= "a" && ch <= "z") {
                    styledChar = String.fromCodePoint(
                        0x1d41a + (code - "a".codePointAt(0))
                    );
                } else if (ch >= "0" && ch <= "9") {
                    styledChar = String.fromCodePoint(
                        0x1d7ce + (code - "0".codePointAt(0))
                    );
                }
            } else if (style === "italic") {
                // Script-style italic (can tweak later if you want a different look)
                if (ch >= "A" && ch <= "Z") {
                    styledChar = String.fromCodePoint(
                        0x1d4d0 + (code - "A".codePointAt(0))
                    );
                } else if (ch >= "a" && ch <= "z") {
                    styledChar = String.fromCodePoint(
                        0x1d4ea + (code - "a".codePointAt(0))
                    );
                }
            }

            result += styledChar;
        }
        return result;
    };

    function LinkedInPostEditor() {
        const [post, setPost] = useState("");
        const [tone, setTone] = useState("Professional");
        const [selectedTemplateId, setSelectedTemplateId] =
            useState("job_announcement");
        const [autoSave, setAutoSave] = useState(true);
        const textareaRef = useRef(null);

        const charCount = post.length;

        const hook = useMemo(() => {
            const firstLine = post.split("\n")[0] || "";
            return firstLine.trim();
        }, [post]);

        const hookLength = hook.length;

        // Load from localStorage on mount
        useEffect(() => {
            try {
                const savedPost =
                    typeof window !== "undefined"
                        ? window.localStorage.getItem(STORAGE_KEY)
                        : null;
                const savedAuto =
                    typeof window !== "undefined"
                        ? window.localStorage.getItem(STORAGE_AUTOSAVE_KEY)
                        : null;

                if (savedPost) {
                    setPost(savedPost);
                }
                if (savedAuto === "false") {
                    setAutoSave(false);
                }
            } catch (e) {
                console.warn("Could not access localStorage", e);
            }
        }, []);

        // Save to localStorage when post or autoSave changes
        useEffect(() => {
            try {
                if (typeof window === "undefined") return;
                window.localStorage.setItem(
                    STORAGE_AUTOSAVE_KEY,
                    String(autoSave)
                );

                if (autoSave) {
                    if (post) {
                        window.localStorage.setItem(STORAGE_KEY, post);
                    } else {
                        window.localStorage.removeItem(STORAGE_KEY);
                    }
                }
            } catch (e) {
                console.warn("Could not write to localStorage", e);
            }
        }, [post, autoSave]);

        const applyWithSelection = (transformFn) => {
            const textarea = textareaRef.current;
            if (!textarea) return;

            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;

            const before = post.slice(0, start);
            const selected = post.slice(start, end);
            const after = post.slice(end);

            const { newText, newStart, newEnd } = transformFn({
                before,
                selected,
                after,
                start,
                end,
            });

            if (newText.length > MAX_CHARS) {
                alert("This change would exceed the 3,000 character limit.");
                return;
            }

            setPost(newText);

            requestAnimationFrame(() => {
                textarea.focus();
                textarea.setSelectionRange(newStart, newEnd);
            });
        };

        const handleChange = (e) => {
            const text = e.target.value;
            if (text.length <= MAX_CHARS) {
                setPost(text);
            }
        };

        const formatBold = () => {
            applyWithSelection(({ before, selected, after }) => {
                const content = selected || "Bold text";
                const styled = styleText(content, "bold");
                const newText = before + styled + after;
                const cursorStart = before.length;
                const cursorEnd = before.length + styled.length;
                return {
                    newText,
                    newStart: cursorStart,
                    newEnd: cursorEnd,
                };
            });
        };

        const formatItalic = () => {
            applyWithSelection(({ before, selected, after }) => {
                const content = selected || "Italic text";
                const styled = styleText(content, "italic");
                const newText = before + styled + after;
                const cursorStart = before.length;
                const cursorEnd = before.length + styled.length;
                return {
                    newText,
                    newStart: cursorStart,
                    newEnd: cursorEnd,
                };
            });
        };

        const addBullet = () => {
            const textarea = textareaRef.current;
            if (!textarea) return;

            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const fullText = post;

            if (start === end) {
                const lineStart = fullText.lastIndexOf("\n", start - 1) + 1;
                const before = fullText.slice(0, lineStart);
                const line = fullText.slice(lineStart);
                const trimmed = line.trimStart();
                const alreadyBullet = trimmed.startsWith("•");
                const bulletPrefix = alreadyBullet ? "" : "• ";
                const newText = before + bulletPrefix + line;

                if (newText.length > MAX_CHARS) {
                    alert("This change would exceed 3,000 characters.");
                    return;
                }

                setPost(newText);

                const newCursor = start + bulletPrefix.length;
                requestAnimationFrame(() => {
                    textarea.focus();
                    textarea.setSelectionRange(newCursor, newCursor);
                });
                return;
            }

            const selectionStartLine =
                fullText.lastIndexOf("\n", start - 1) + 1 || 0;
            const selectionEndLine =
                fullText.indexOf("\n", end) === -1
                    ? fullText.length
                    : fullText.indexOf("\n", end);

            const beforeBlock = fullText.slice(0, selectionStartLine);
            const block = fullText.slice(selectionStartLine, selectionEndLine);
            const afterBlock = fullText.slice(selectionEndLine);

            const blockLines = block.split("\n");
            const bulletLines = blockLines.map((line) => {
                const trimmed = line.trim();
                if (!trimmed) return "";
                if (trimmed.startsWith("•")) return line;
                return "• " + trimmed;
            });

            const newBlock = bulletLines.join("\n");
            const newText = beforeBlock + newBlock + afterBlock;

            if (newText.length > MAX_CHARS) {
                alert("This change would exceed 3,000 characters.");
                return;
            }

            setPost(newText);

            const newStart = selectionStartLine;
            const newEnd = selectionStartLine + newBlock.length;

            requestAnimationFrame(() => {
                textarea.focus();
                textarea.setSelectionRange(newStart, newEnd);
            });
        };

        const addNumberedList = () => {
            const textarea = textareaRef.current;
            if (!textarea) return;

            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const fullText = post;

            const selectionStartLine =
                fullText.lastIndexOf("\n", start - 1) + 1 || 0;
            const selectionEndLine =
                start === end
                    ? fullText.indexOf("\n", start) === -1
                        ? fullText.length
                        : fullText.indexOf("\n", start)
                    : fullText.indexOf("\n", end) === -1
                        ? fullText.length
                        : fullText.indexOf("\n", end);

            const beforeBlock = fullText.slice(0, selectionStartLine);
            const block = fullText.slice(selectionStartLine, selectionEndLine);
            const afterBlock = fullText.slice(selectionEndLine);

            const blockLines = block.split("\n");
            let counter = 1;
            const numberedLines = blockLines.map((line) => {
                const trimmed = line.trim();
                if (!trimmed) return "";
                if (/^\d+\.\s+/.test(trimmed)) return trimmed;
                const numbered = `${counter}. ${trimmed}`;
                counter += 1;
                return numbered;
            });

            const newBlock = numberedLines.join("\n");
            const newText = beforeBlock + newBlock + afterBlock;

            if (newText.length > MAX_CHARS) {
                alert("This change would exceed 3,000 characters.");
                return;
            }

            setPost(newText);

            const newStart = selectionStartLine;
            const newEnd = selectionStartLine + newBlock.length;

            requestAnimationFrame(() => {
                textarea.focus();
                textarea.setSelectionRange(newStart, newEnd);
            });
        };

        const insertEmoji = (emoji) => {
            applyWithSelection(({ before, selected, after }) => {
                const newText = before + emoji + selected + after;
                const newStart = (before + emoji).length;
                const newEnd = newStart + selected.length;
                return { newText, newStart, newEnd };
            });
        };

        // NEW: friendlier clean that keeps paragraph spacing
        const cleanForLinkedIn = () => {
            let text = post || "";

            // Normalize line endings
            text = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n");

            const lines = text.split("\n");
            const cleanedLines = [];

            for (let rawLine of lines) {
                // Remove trailing spaces, but don't drop the line
                let line = rawLine.replace(/\s+$/, "");

                // Normalize bullets: -, *, • => "• "
                const bulletMatch = line.match(/^\s*([-*•])\s+(.*)/);
                if (bulletMatch) {
                    const content = bulletMatch[2].trim();
                    line = `• ${content}`;
                }

                // Normalize numbered lines: "1 text" or "1.  text" => "1. text"
                const numberMatch = line.match(/^\s*(\d+)\.?\s+(.*)/);
                if (numberMatch) {
                    const num = numberMatch[1];
                    const content = numberMatch[2].trim();
                    line = `${num}. ${content}`;
                }

                cleanedLines.push(line);
            }

            // Don't trim blank lines at the end; keep exact structure
            text = cleanedLines.join("\n");
            setPost(text);
        };

        const copyToClipboard = async () => {
            try {
                await navigator.clipboard.writeText(post);
                alert("Post copied to clipboard!");
            } catch {
                alert("Could not copy. Please copy manually.");
            }
        };

        // NEW: Clear editor + localStorage
        const clearEditor = () => {
            setPost("");
            try {
                if (typeof window !== "undefined") {
                    window.localStorage.removeItem(STORAGE_KEY);
                }
            } catch (e) {
                console.warn("Could not clear localStorage", e);
            }
            if (textareaRef.current) {
                textareaRef.current.focus();
                textareaRef.current.setSelectionRange(0, 0);
            }
        };

        const insertTemplate = () => {
            const template = TEMPLATES.find((t) => t.id === selectedTemplateId);
            if (!template) return;
            setPost(template.content);
            requestAnimationFrame(() => {
                if (textareaRef.current) {
                    textareaRef.current.focus();
                    textareaRef.current.setSelectionRange(
                        template.content.length,
                        template.content.length
                    );
                }
            });
        };

        const charColor =
            charCount > MAX_CHARS * 0.9
                ? "text-red-500"
                : charCount > MAX_CHARS * 0.7
                    ? "text-amber-500"
                    : "text-slate-500";

        const hookColor =
            hookLength > HOOK_MAX
                ? "text-amber-500"
                : hookLength === 0
                    ? "text-slate-400"
                    : "text-emerald-500";

        const renderPreview = (text) => {
            const lines = text.split("\n");
            const elements = [];
            let currentList = null;

            const flushList = () => {
                if (!currentList) return;
                if (currentList.type === "ul") {
                    elements.push(
                        <ul
                            className="list-disc list-inside space-y-1"
                            key={elements.length}
                        >
                            {currentList.items.map((item, idx) => (
                                <li key={idx}>{item}</li>
                            ))}
                        </ul>
                    );
                } else if (currentList.type === "ol") {
                    elements.push(
                        <ol
                            className="list-decimal list-inside space-y-1"
                            key={elements.length}
                        >
                            {currentList.items.map((item, idx) => (
                                <li key={idx}>{item}</li>
                            ))}
                        </ol>
                    );
                }
                currentList = null;
            };

            lines.forEach((rawLine) => {
                const line = rawLine.trimEnd();
                const bulletMatch = line.match(/^•\s+(.*)/);
                const numberMatch = line.match(/^(\d+)\.\s+(.*)/);

                if (bulletMatch) {
                    const content = bulletMatch[1];
                    if (!currentList || currentList.type !== "ul") {
                        flushList();
                        currentList = { type: "ul", items: [] };
                    }
                    currentList.items.push(content);
                } else if (numberMatch) {
                    const content = numberMatch[2];
                    if (!currentList || currentList.type !== "ol") {
                        flushList();
                        currentList = { type: "ol", items: [] };
                    }
                    currentList.items.push(content);
                } else if (line.trim() === "") {
                    flushList();
                    elements.push(
                        <div key={elements.length} className="h-2" />
                    );
                } else {
                    flushList();
                    elements.push(
                        <p className="mb-1" key={elements.length}>
                            {line}
                        </p>
                    );
                }
            });

            flushList();
            return <>{elements}</>;
        };

        return (
            <div className="min-h-screen flex items-center justify-center p-4">
                <div className="w-full max-w-5xl grid gap-6 md:grid-cols-[2fr,1.5fr]">
                    {/* Editor Card */}
                    <div className="bg-white rounded-2xl shadow-md p-6 space-y-4">
                        <div className="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                            <div>
                                <h1 className="text-2xl font-bold text-slate-900">
                                    LinkedIn Post Editor
                                </h1>
                                <p className="text-sm text-slate-500">
                                    Paste from ChatGPT (or any AI), or start from a template.
                                    Format with Unicode bold/italic, bullets, numbers &
                                    emojis — then paste directly into LinkedIn.
                                </p>
                            </div>

                            <div className="flex items-center gap-2">
                                <label className="text-xs font-medium text-slate-500 uppercase tracking-wide">
                                    Tone
                                </label>
                                <select
                                    value={tone}
                                    onChange={(e) => setTone(e.target.value)}
                                    className="border border-slate-200 text-sm rounded-xl px-3 py-1.5 bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                >
                                    <option>Professional</option>
                                    <option>Casual</option>
                                    <option>Storytelling</option>
                                    <option>Thought Leadership</option>
                                    <option>Technical</option>
                                </select>
                            </div>
                        </div>

                        {/* Templates */}
                        <div className="flex flex-col gap-2 border border-slate-200 rounded-xl px-3 py-3 bg-white">
                            <div className="flex flex-wrap items-center gap-2">
                    <span className="text-xs font-semibold text-slate-500">
                      Templates:
                    </span>
                                <select
                                    value={selectedTemplateId}
                                    onChange={(e) => setSelectedTemplateId(e.target.value)}
                                    className="border border-slate-200 text-xs rounded-lg px-2 py-1 bg-slate-50 focus:outline-none focus:ring-1 focus:ring-indigo-500"
                                >
                                    {TEMPLATES.map((t) => (
                                        <option key={t.id} value={t.id}>
                                            {t.name}
                                        </option>
                                    ))}
                                </select>
                                <button
                                    type="button"
                                    onClick={insertTemplate}
                                    className="px-3 py-1.5 text-xs font-medium rounded-lg bg-indigo-600 text-white hover:bg-indigo-700"
                                >
                                    Load template
                                </button>
                            </div>
                            <p className="text-[11px] text-slate-500">
                                Selected:{" "}
                                {
                                    TEMPLATES.find((t) => t.id === selectedTemplateId)
                                        ?.description
                                }
                            </p>
                        </div>

                        {/* Formatting Toolbar */}
                        <div className="flex flex-wrap items-center gap-2 border border-slate-200 rounded-xl px-3 py-2 bg-slate-50">
                  <span className="text-xs font-semibold text-slate-500 mr-1">
                    Format:
                  </span>
                            <button
                                type="button"
                                onClick={formatBold}
                                className="px-2 py-1 text-xs font-bold rounded-lg border border-slate-200 bg-white hover:bg-slate-100"
                            >
                                B
                            </button>
                            <button
                                type="button"
                                onClick={formatItalic}
                                className="px-2 py-1 text-xs italic rounded-lg border border-slate-200 bg-white hover:bg-slate-100"
                            >
                                I
                            </button>
                            <button
                                type="button"
                                onClick={addBullet}
                                className="px-2 py-1 text-xs rounded-lg border border-slate-200 bg-white hover:bg-slate-100"
                            >
                                • Bullet
                            </button>
                            <button
                                type="button"
                                onClick={addNumberedList}
                                className="px-2 py-1 text-xs rounded-lg border border-slate-200 bg-white hover:bg-slate-100"
                            >
                                1. 2. 3.
                            </button>
                        </div>

                        {/* Emoji toolbar */}
                        <div className="flex flex-wrap items-center gap-2 border border-slate-200 rounded-xl px-3 py-2 bg-white">
                  <span className="text-xs font-semibold text-slate-500">
                    Emojis:
                  </span>
                            {EMOJIS.map((emoji) => (
                                <button
                                    key={emoji}
                                    type="button"
                                    onClick={() => insertEmoji(emoji)}
                                    className="px-1 text-lg leading-none hover:scale-110 transition-transform"
                                >
                                    {emoji}
                                </button>
                            ))}
                        </div>

                        <textarea
                            ref={textareaRef}
                            value={post}
                            onChange={handleChange}
                            placeholder={`Paste AI content here or load a template.

Then:
• Use B / I / Bullet / 1.2.3 to format key parts.
• Add emojis that match LinkedIn style.
• Click “Clean for LinkedIn” to fix bullets & spacing without killing your paragraphs.
• Copy and paste directly into LinkedIn.`}
                            className="w-full min-h-[230px] rounded-2xl border border-slate-200 p-4 text-sm md:text-base resize-y focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent placeholder:text-slate-400"
                        />

                        <div className="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between text-xs md:text-sm">
                            <div className="space-y-1">
                                <p className={`${charColor} font-medium`}>
                                    {charCount} / {MAX_CHARS} characters
                                </p>
                                <p className="text-slate-400">
                                    Live character counting so you stay under the 3,000
                                    limit.
                                </p>
                                <label className="inline-flex items-center gap-2 text-[11px] text-slate-500 mt-1">
                                    <input
                                        type="checkbox"
                                        className="rounded border-slate-300"
                                        checked={autoSave}
                                        onChange={(e) => setAutoSave(e.target.checked)}
                                    />
                                    <span>Auto-save in this browser</span>
                                </label>
                            </div>

                            <div className="flex gap-2 justify-end flex-wrap">
                                <button
                                    onClick={clearEditor}
                                    type="button"
                                    className="inline-flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium bg-white border border-slate-200 text-slate-600 hover:bg-slate-50"
                                >
                                    Clear
                                </button>
                                <button
                                    onClick={cleanForLinkedIn}
                                    type="button"
                                    className="inline-flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium bg-slate-100 text-slate-800 hover:bg-slate-200"
                                >
                                    Clean for LinkedIn
                                </button>
                                <button
                                    onClick={copyToClipboard}
                                    className="inline-flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium bg-indigo-600 text-white hover:bg-indigo-700 active:bg-indigo-800 shadow-sm"
                                >
                                    Copy post
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Preview Card */}
                    <div className="bg-white rounded-2xl shadow-md p-6 space-y-4">
                        <h2 className="text-lg font-semibold text-slate-900 flex items-center gap-2">
                            Preview
                            <span className="text-xs font-medium px-2 py-0.5 rounded-full bg-slate-100 text-slate-500">
                    {tone}
                  </span>
                        </h2>

                        <div className="border border-slate-100 rounded-2xl p-4 bg-slate-50 space-y-3">
                            <div>
                                <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1">
                                    Hook (first line)
                                </p>
                                <p
                                    className={`text-sm md:text-base font-medium break-words ${
                                        hook ? "text-slate-900" : "text-slate-400"
                                    }`}
                                >
                                    {hook ||
                                        "Your first line appears here. Make people stop scrolling."}
                                </p>
                                <p className={`text-xs mt-1 ${hookColor}`}>
                                    {hookLength === 0
                                        ? "Try a strong, curiosity-building first sentence."
                                        : hookLength > HOOK_MAX
                                            ? `Your hook is ${hookLength} characters. Consider tightening it (aim for under ${HOOK_MAX}).`
                                            : `Nice! Your hook is ${hookLength} characters — short and scroll-stopping.`}
                                </p>
                            </div>

                            <div className="pt-3 border-t border-slate-200">
                                <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1">
                                    Full post
                                </p>
                                <div className="text-sm md:text-base text-slate-800 max-h-[260px] overflow-auto whitespace-pre-wrap">
                                    {post ? (
                                        renderPreview(post)
                                    ) : (
                                        <span className="text-slate-400">
                          Your full post preview will show here as you type or
                          after you load a template.
                        </span>
                                    )}
                                </div>
                            </div>
                        </div>

                        <div className="text-xs text-slate-500 space-y-1">
                            <p className="font-semibold text-slate-600">
                                This editor is built to:
                            </p>
                            <ul className="list-disc list-inside space-y-1">
                                <li>Give you plug-and-play LinkedIn templates.</li>
                                <li>Keep AI-generated bullet points readable.</li>
                                <li>Apply Unicode bold / italic that survives on LinkedIn.</li>
                                <li>Support both bullets and numbered lists.</li>
                                <li>Highlight and optimize your hook.</li>
                                <li>Auto-save locally (with a toggle) and clear in one click.</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<LinkedInPostEditor />);
</script>
</body>
</html>
